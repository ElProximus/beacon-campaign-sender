<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="x-apple-disable-message-reformatting">
    <title></title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:AllowPNG/>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style type="text/css">
        /* Reset */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            height: 100% !important;
            width: 100% !important;
        }
        * {
            -ms-text-size-adjust: 100%;
            -webkit-text-size-adjust: 100%;
        }
        div[style*="margin: 16px 0"] {
            margin: 0 !important;
        }
        table, td {
            mso-table-lspace: 0pt !important;
            mso-table-rspace: 0pt !important;
        }
        table {
            border-spacing: 0 !important;
            border-collapse: collapse !important;
            table-layout: fixed !important;
            margin: 0 auto !important;
        }
        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
        }
        a {
            text-decoration: none;
        }

        /* Mobile Responsive */
        @media only screen and (max-width: 620px) {
            .email-container {
                width: 100% !important;
                margin: auto !important;
            }
            .fluid {
                max-width: 100% !important;
                height: auto !important;
                margin-left: auto !important;
                margin-right: auto !important;
            }
            .stack-column,
            .stack-column-center {
                display: block !important;
                width: 100% !important;
                max-width: 100% !important;
                direction: ltr !important;
            }
            .stack-column-center {
                text-align: center !important;
            }
            .center-on-narrow {
                text-align: center !important;
                display: block !important;
                margin-left: auto !important;
                margin-right: auto !important;
                float: none !important;
            }
            table.center-on-narrow {
                display: inline-block !important;
            }
            .mobile-padding {
                padding-left: 20px !important;
                padding-right: 20px !important;
            }
            .mobile-hide {
                display: none !important;
            }
            .cta-button {
                width: 100% !important;
                max-width: 300px !important;
            }
        }
    </style>
</head>
<body width="100%" style="margin: 0; padding: 0 !important; mso-line-height-rule: exactly; background-color: #f4f4f4;">
    <center style="width: 100%; background-color: #f4f4f4;">
    <!--[if mso | IE]>
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f4f4f4;">
    <tr>
    <td>
    <![endif]-->

        <!-- Preview Text (hidden) -->
        <div style="display: none; font-size: 1px; line-height: 1px; max-height: 0px; max-width: 0px; opacity: 0; overflow: hidden; mso-hide: all;">
            {{PREVIEW_TEXT}}
        </div>

        <!-- Spacer -->
        <div style="max-width: 600px; margin: 0 auto; padding: 20px 0 0;">
            &nbsp;
        </div>

        <!-- Email Body -->
        <table align="center" role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="margin: auto;" class="email-container">

            <!-- Header -->
            <tr>
                <td style="background-color: #ffffff; padding: 30px 40px 20px; text-align: center; border-radius: 8px 8px 0 0;" class="mobile-padding">
                    <h1 style="margin: 0; font-family: Arial, Helvetica, sans-serif; font-size: 24px; line-height: 1.3; color: #333333; font-weight: 700;">
                        {{COMPANY_NAME}}
                    </h1>
                </td>
            </tr>

            <!-- Main Content -->
            <tr>
                <td style="background-color: #ffffff; padding: 10px 40px 30px; font-family: Arial, Helvetica, sans-serif; font-size: 15px; line-height: 1.6; color: #555555;" class="mobile-padding">
                    {{CONTENT}}
                </td>
            </tr>

            <!-- CTA Button -->
            <tr>
                <td style="background-color: #ffffff; padding: 0 40px 30px; text-align: center;" class="mobile-padding">
                    <!--[if mso]>
                    <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{CTA_URL}}" style="height:48px;v-text-anchor:middle;width:220px;" arcsize="10%" strokecolor="#2271b1" fillcolor="#2271b1">
                    <w:anchorlock/>
                    <center style="color:#ffffff;font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:bold;">{{CTA_TEXT}}</center>
                    </v:roundrect>
                    <![endif]-->
                    <!--[if !mso]><!-->
                    <a href="{{CTA_URL}}" class="cta-button" style="display: inline-block; padding: 14px 36px; font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; color: #ffffff; background-color: #2271b1; border-radius: 5px; text-decoration: none; text-align: center;">
                        {{CTA_TEXT}}
                    </a>
                    <!--<![endif]-->
                </td>
            </tr>

            <!-- Divider -->
            <tr>
                <td style="background-color: #ffffff; padding: 0 40px;" class="mobile-padding">
                    <hr style="border: 0; border-top: 1px solid #eeeeee; margin: 0;">
                </td>
            </tr>

            <!-- Footer -->
            <tr>
                <td style="background-color: #ffffff; padding: 20px 40px 30px; font-family: Arial, Helvetica, sans-serif; font-size: 12px; line-height: 1.6; color: #999999; text-align: center; border-radius: 0 0 8px 8px;" class="mobile-padding">
                    <p style="margin: 0 0 8px;">
                        {{COMPANY_NAME}}<br>
                        {{COMPANY_ADDRESS}}
                    </p>
                    <p style="margin: 0 0 8px;">
                        You received this email because you are subscribed to our mailing list.
                    </p>
                    <p style="margin: 0;">
                        <a href="{{UNSUBSCRIBE_URL}}" style="color: #999999; text-decoration: underline;">Unsubscribe</a>
                        &nbsp;&middot;&nbsp;
                        <a href="{{PREFERENCES_URL}}" style="color: #999999; text-decoration: underline;">Email Preferences</a>
                    </p>
                </td>
            </tr>

        </table>

        <!-- Spacer -->
        <div style="max-width: 600px; margin: 0 auto; padding: 0 0 40px;">
            &nbsp;
        </div>

    <!--[if mso | IE]>
    </td>
    </tr>
    </table>
    <![endif]-->
    </center>
</body>
</html>
